<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MOVA ID CARD</title>

<!-- QR -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- CROPPER -->
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#ffe6f2,
#ffd6eb,
#fff0f7
);
padding:20px;
min-height:100vh;
}

/* CONTAINER */

.container{
max-width:550px;
margin:auto;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(255,105,180,0.2);
}

h1{
text-align:center;
color:#ff1493;
margin-bottom:20px;
}

.input-box{
margin-bottom:15px;
}

.input-box label{
display:block;
margin-bottom:7px;
font-weight:bold;
color:#c2185b;
}

.input-box input,
.input-box textarea{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:#fff0f7;
outline:none;
font-size:15px;
}

textarea{
height:80px;
resize:none;
}

/* BUTTON */

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:linear-gradient(
135deg,
#ff69b4,
#ff1493
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* CARD */

.preview-card{
margin-top:25px;
padding:25px;
border-radius:25px;
background:linear-gradient(
135deg,
#ffb6d9,
#ffd6eb
);
display:none;
text-align:center;
}

#qrcode{
margin-top:20px;
}

#qrcode canvas{
width:150px !important;
height:150px !important;
background:white;
padding:10px;
border-radius:20px;
}

/* CROP */

#cropContainer{
display:none;
margin-top:20px;
}

#cropImage{
width:100%;
max-height:300px;
}

.id-text{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#c2185b;
}

</style>

</head>

<body>

<div class="container">

<h1>MOVA ID CARD</h1>

<!-- FORM -->

<div class="input-box">
<label>Name</label>
<input type="text" id="name">
</div>

<div class="input-box">
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="input-box">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-box">
<label>Address</label>
<textarea id="address"></textarea>
</div>

<div class="input-box">
<label>Choose Photo</label>
<input
type="file"
id="photo"
accept="image/*"
>
</div>

<!-- CROP -->

<div id="cropContainer">

<img id="cropImage">

<button onclick="cropPhoto()">
Crop Photo
</button>

</div>

<button onclick="generateCard()">
Generate ID Card
</button>

<!-- GENERATED CARD -->

<div class="preview-card" id="card">

<h2 style="
color:#ff1493;
font-size:30px;
margin-bottom:10px;
">
MOVA
</h2>

<p style="
font-size:14px;
letter-spacing:4px;
color:black;
">
ID CARD
</p>

<div id="qrcode"></div>

<div class="id-text" id="showId"></div>

<button onclick="downloadCard()">
Download ID Card
</button>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCQi9qjhhgh1VBBQIGA6NHyjQy0bdLmuWI",

authDomain: "mova-id.firebaseapp.com",

databaseURL:
"https://mova-id-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "mova-id",

storageBucket: "mova-id.firebasestorage.app",

messagingSenderId: "1032823619174",

appId:
"1:1032823619174:web:b3dc46b0cb442e51caf7a7",

measurementId: "G-2BLNYQE0YT"

};

/* INITIALIZE */

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

let cropper;
let croppedImage = "";

/* PHOTO */

document
.getElementById("photo")
.addEventListener("change",function(e){

const file =
e.target.files[0];

if(file){

const reader =
new FileReader();

reader.onload = function(event){

document
.getElementById("cropContainer")
.style.display = "block";

const image =
document.getElementById("cropImage");

image.src =
event.target.result;

if(cropper){
cropper.destroy();
}

cropper =
new Cropper(image,{
aspectRatio:1,
viewMode:1
});

};

reader.readAsDataURL(file);

}

});

/* CROP */

window.cropPhoto = function(){

const canvas =
cropper.getCroppedCanvas({
width:300,
height:300
});

croppedImage =
canvas.toDataURL("image/png");

alert("Photo Cropped");

}

/* GENERATE */

window.generateCard =
async function(){

const name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const email =
document.getElementById("email").value;

const address =
document.getElementById("address").value;

if(
!name ||
!phone ||
!email ||
!address ||
!croppedImage
){
alert("Fill all details");
return;
}

/* ID */

const userId =
"MOVA" + Date.now();

/* SAVE DATABASE */

await set(
ref(db,"users/" + userId),
{
id:userId,
name:name,
phone:phone,
email:email,
address:address,
photo:croppedImage
}
);

/* SHOW CARD */

document.getElementById("card").style.display =
"block";

document.getElementById("showId").innerText =
userId;

/* QR */

document.getElementById("qrcode").innerHTML =
"";

QRCode.toCanvas(userId,function(error,canvas){

document
.getElementById("qrcode")
.appendChild(canvas);

});

alert("ID Generated Successfully");

}

/* DOWNLOAD */

window.downloadCard =
async function(){

const { jsPDF } =
window.jspdf;

const pdf =
new jsPDF({
orientation:"portrait",
unit:"mm",
format:[54,86]
});

/* CARD BG */

pdf.setFillColor(255,245,250);

pdf.roundedRect(
0,
0,
54,
86,
4,
4,
"F"
);

/* DESIGN */

pdf.setFillColor(255,182,217);

pdf.circle(10,10,18,"F");

pdf.circle(50,80,20,"F");

/* LOGO */

pdf.setTextColor(0,0,0);

pdf.setFontSize(18);

pdf.text(
"MOVA",
14,
20
);

pdf.setFontSize(8);

pdf.text(
"ID CARD",
18,
25
);

/* QR */

const qrCanvas =
document.querySelector("#qrcode canvas");

const qrImage =
qrCanvas.toDataURL("image/png");

pdf.addImage(
qrImage,
"PNG",
10,
30,
34,
34
);

/* ID BOX */

const userId =
document.getElementById("showId").innerText;

pdf.setDrawColor(255,105,180);

pdf.roundedRect(
8,
70,
38,
8,
2,
2
);

pdf.setFontSize(9);

pdf.setTextColor(199,21,133);

pdf.text(
userId,
11,
75
);

/* DOWNLOAD */

pdf.save(userId + ".pdf");

}

</script>

</body>

</html>
